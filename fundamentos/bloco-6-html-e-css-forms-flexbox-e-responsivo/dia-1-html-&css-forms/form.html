<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./css/styles.css">
  <title>Document</title>
</head>

<body>
  <header>
    <h1>Formulário para cadastro de currículo</h1>
    <p>Preencha os campos abaixo.</p>
  </header>
  <form action="" method="GET">
    <fieldset class="fieldset">
      <legend>Dados pessoais:</legend>

      <div class="style-dados-pessoais">
        <label for="nome">Nome:</label>
        <input type="text" id="nome"  maxlength="40" required>

        <br><br>

        <label for="email">E-mail: </label>
        <input type="email" id="email"  maxlength="50" required>

        <br><br>

        <label for="cpf">CPF: </label>
        <input type="text" id="cpf"  maxlength="11" required>

        <br><br>

        <label for="endereco">Endereço: </label>
        <input type="text" id="endereco"  maxlength="200" required>

        <br><br>

        <label for="cidade">Cidade: </label>
        <input type="text"  id="cidade"  maxlength="28" required>
      </div>

      <label for="estados">Estados</label>
      <select name="estados" id="estados" required></select>

      <br><br>

      
        <label for="residencia">Tipo de imóvel: </label>
        <input type="radio" name="residencia" id="casa" value="casa" required> <span>Casa</span>
        <input type="radio" name="residencia" id="apartamneto" value="apartamneto" required>
        <span>Apartamento</span>
      
    </fieldset>

    <fieldset class="fieldset">
      <legend>Nos conte sobre o seu último emprego</legend>
      <div>
        <p>Faça um breve resumo sobre o seu currículo</p>
        <textarea name="text" id="resumo" required cols="55" rows="10"   maxlengthlength="1000"></textarea>

        <br><br>

        <label for="cargo">Cargo</label>
        <input type="text" id="cargo" required  maxlengthlength="40">

        <br><br>

        <p>Faça um breve resumo sobre  o seu último cargo</p> <br>
        <textarea name="text" id="resumo" required cols="50" rows="10"   maxlengthlength="500"></textarea>

        <br><br>
        <div class="line-content">
          <label for="startDate">Data de início: </label>
          <input type="text" class="input-data" name="startDate" value="" required>
        </div>
    </fieldset>

    <button type="submit" id="buttonPrevent">Entrar</button>
    <button type="reset">Apaga tudo</button>
  </form>
  <script src="./script/script.js"></script>
</body>

</html>
