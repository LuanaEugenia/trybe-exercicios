<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./css/styles.css">
  <title>Document</title>
</head>

<body>
  <form action="" method="GET" class="fieldset">
    <fieldset>
      <legend>Dados pessoais:</legend>

      <div class="style-dados-pessoais">
        <label for="nome">Nome:</label>
        <input type="text" id="nome" max="40" required>

        <br><br>

        <label for="email">E-mail: </label>
        <input type="email" id="email" max="50" required>

        <br><br>

        <label for="cpf">CPF: </label>
        <input type="text" id="cpf" max="11" required>

        <br><br>

        <label for="endereco">Endereço: </label>
        <input type="text" id="endereco" max="200" required>

        <br><br>

        <label for="cidade">Cidade: </label>
        <input type="text" id="cidade" max="28" required>
      </div>

      <label for="estados">Estados</label>
      <select name="estados" id="estados"></select>
    </fieldset>
  </form>

  <script src="./script/script.js"></script>
</body>

</html>
